            <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --accent-color: #000000;
            --line-color: #e0e0e0; 
            --stable-bar: #6A7F73; /* 灰绿色 */
            --adventure-bar: #C5A059; /* 灰黄色 */
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px; /* 增加上下边距 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

 /* 封面样式 */
        #cover-container { text-align: center; }
        
        .main-title { font-size: 3rem; font-weight: 400; letter-spacing: 12px; margin-bottom: 5px; text-shadow: 2px 2px 2px #8e8e8e; }
        .sub-title-box { background: #000; color: #fff; display: inline-block; padding: 2px 10px; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; margin-top: 4px; margin-left: 200px; }
        .slogan { color: var(--text-sub); font-size: 0.9rem; color: #848484; letter-spacing: 3px; border-top: 1px solid var(--line-color); border-bottom: 1px solid var(--line-color); padding: 15px 0; margin: 20px 0; }

        /* 动态圆环容器 */
        .circle-container {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            position: relative;
            /* 滤镜调用：实现扭曲抖动 */
            filter: url(#wavy);
        }
        .dynamic-circle {
            width: 100%;
            height: 100%;
            background: url('E0000_067.png') no-repeat center;
            background-size: contain;
            animation: rotateSlow 20s linear infinite;
        }
        @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .intro-text { font-size: 0.8rem; letter-spacing: 2px; line-height: 1.8; margin-top: 30px; }
        .en-text { font-size: 0.6rem; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* 输入框与按钮 */
        .input-group { margin: 40px auto 20px; width: 200px; position: relative; }
        .code-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000;
            background: transparent;
            text-align: center;
            padding: 10px 0;
            font-family: 'Noto Serif SC';
            outline: none;
            font-size: 0.9rem;
        }
        .start-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 50px;
            font-family: 'Noto Serif SC';
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.3s;
            margin-top: 20px;
        }
        .start-btn:hover { opacity: 0.8; transform: scale(1.05); }

        .copyright { font-size: 0.6rem; color: #ccc; margin-top: 80px; letter-spacing: 2px; }

/* 默认隐藏测试区 */
#quiz-container { display: none; }

        #quiz-container, #result-container {
            width: 100%;
            max-width: 650px;
            margin-top: 40px;
        }

        /* 顶部控制栏 */
        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        #back-btn {
            font-size: 0.85rem;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            user-select: none;
        }
        #back-btn:hover { color: #000; }

        .question-card { margin-bottom: 40px; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        
        .option-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            border: 1px solid #333; background: none; font-family: inherit;
            cursor: pointer; transition: all 0.3s; text-align: left;
        }

        .option-btn:hover { background: var(--accent-color); color: white; }

        /* 修复：强制每个板块垂直排布，互不干扰 */
        .section-block { 
            margin-bottom: 80px; 
            width: 100%;
            display: block;
            clear: both;
        }

        .audit-section-title {
            border-left: 5px solid #000;
            padding-left: 15px;
            margin-bottom: 30px;
            font-size: 1.4rem;
            color: #000;
            text-align: left;
            font-weight: 700;
        }

        /* 双向条形图 */
        .dimension-container { margin-bottom: 25px; display: flex; flex-direction: column; }
        .dim-header { color: #000; font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; text-align: left; }
        .bar-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 3px; }

        .dual-bar-wrapper {
            height: 12px;
            background: #f0f0f0; /* 给个浅灰底色 */
            position: relative;
            width: 100%;
            display: flex;
        }

        /* 修复：词云容器必须具备相对定位，且通过 flex 彻底居中中心词 */
       .word-cloud-container {
    position: relative;
    width: 100%;
    height: 200px; /* 必须给高度，给下面的板块留出空间 */
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 40px 0;
    overflow: visible; /* 允许陪跑词稍微超出边界 */
}

.core-job {
    font-size: 2rem;
    font-weight: bold;
    color: #000;
    z-index: 10;
    position: relative; /* 确保它在中心 */
}

.side-job {
    position: absolute; /* 相对于 container 绝对定位 */
    color: #8d8d8d;
    font-size: 1.4rem;
    white-space: nowrap;
    transform: translate(-50%,-50%);
    left: 50%;
    right: 50%;
}

        /* 入行指南 */
        .guide-box {
            border: 1px solid #e0e0e0;
            padding: 25px;
            width: 100%;
            box-sizing: border-box; /* 确保内边距不撑大容器 */
        }

        .guide-item h4 {
            font-size: 0.9rem;
            color: #000;
            border-bottom: 1px solid #eee;
            display: inline-block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        
        .guide-item p { margin-top: 0; margin-bottom: 10px; font-size: 0.95rem; }
        .guide-item i { font-style: italic; color: #333; }

        /* 固定在左下角的重启按钮 */
.floating-reset-btn {
    display: block;
    font-family: 'Noto Serif SC', serif;
    margin-top: 20px;
    margin-left: 0;
    background: #000;
    color: #fff;
    padding: 8px 20px;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
}
.floating-reset-btn:hover {
    background: #000;
    color: #fff;
}
    </style>

            { id: 15, dim: 'dim2', text: "如果一只猫头鹰给你指路，你会？", a: "先判断它的飞行轨迹是否合理", b: "直接跟着它的羽翼没入夜色", weight: 1.0 },
            { id: 16, dim: 'dim2', text: "比起言之有据的论证，你是否更容易被瞬时的灵感击中？", a: "否", b: "是", weight: 1.0 },
            { id: 17, dim: 'dim3', text: "长久的社交之后，你需要的是？", a: "独处的静默", b: "更热闹的狂欢", weight: 1.5 },
            { id: 18, dim: 'dim3', text: "流落到物资丰富的荒岛，你感到？", a: "自由", b: "被世界遗弃的恐慌", weight: 1.0 },
            { id: 19, dim: 'dim3', text: "丛林里正在举办篝火晚会，你的角色是？", a: "躲在树影里观察火苗的看客", b: "冲进舞池最中心的领舞者", weight: 1.0 },
            { id: 20, dim: 'dim3', text: "你是否觉得，最深刻的思想总是在人群撤离后的空旷中产生的？", a: "是", b: "否", weight: 1.0 },
            { id: 21, dim: 'dim3', text: "你是否认为“理解”是一种奢侈品，大多数沟通只是噪音？", a: "是", b: "否", weight: 1.0 },
            { id: 22, dim: 'dim3', text: "对他人的赞美，你感到的是？", a: "社交礼仪下的负担", b: "由衷的喜悦", weight: 1.0 },
            { id: 23, dim: 'dim3', text: "如果能拥有一座无限大的图书馆，你希望它是？", a: "只属于你一个人的禁地", b: "对外开放的文学沙龙", weight: 1.0 },
            { id: 24, dim: 'dim3', text: "在面对密集的客户服务时，你感到？", a: "能量的消耗", b: "在与人的连接中获得了动力", weight: 1.0 },
            { id: 25, dim: 'dim4', text: "你更愿意？", a: "花一年时间打磨一只完美的银器", b: "用一天时间处理十件琐事", weight: 1.5 },
            { id: 26, dim: 'dim4', text: "长久的等待对你而言是？", a: "蓄势待发", b: "对生命的挥霍", weight: 1.0 },
            { id: 27, dim: 'dim4', text: "在重复性的高强度工作中，你感受到的是？", a: "难得的心流", b: "对机械劳动的厌倦", weight: 1.0 },
            { id: 28, dim: 'dim4', text: "当截止日期逼近，你是否反而能爆发出平时没有的惊人创作力？", a: "否", b: "是", weight: 1.0 },
            { id: 29, dim: 'dim4', text: "种下一颗种子，你会？", a: "每天记录它生长的高度", b: "想要“瞬间开花结果”的魔法化肥", weight: 1.0 },
            { id: 30, dim: 'dim4', text: "你认为？", a: "速度会影响品质", b: "效率本身就是一种美德", weight: 1.0 },
            { id: 31, dim: 'dim4', text: "当你被打断思路时，你更难以忍受的是？", a: "工作成果的质量会下降", b: "工作节奏中断", weight: 1.0 },
            { id: 32, dim: 'dim4', text: "比起痴迷于“打磨”，你是否更追求“完成”？", a: "否", b: "是", weight: 1.0 },
            { id: 33, dim: 'dim5', text: "当内容创作面临审查或市场迎合时，你会？", a: "为了生存妥协", b: "为了表达的自由选择流浪", weight: 1.5 },
            { id: 34, dim: 'dim5', text: "你更渴望？", a: "被世界需要", b: "不被世界打扰", weight: 1.0 },
            { id: 35, dim: 'dim5', text: "当大多数人反馈不理解你的作品，你会？", a: "立刻反思并调整表达方式", b: "认为这是大众的问题，不改变分毫", weight: 1.0 },
            { id: 36, dim: 'dim5', text: "你是否愿意为了一个永恒的归宿，交出你对夜晚的处置权？", a: "是", b: "否", weight: 1.0 },
            { id: 37, dim: 'dim5', text: "你认为真正的尊严来自？", a: "被社会评价体系认可", b: "不再受制于任何契约", weight: 1.0 },
            { id: 38, dim: 'dim5', text: "你如何看待社交平台的热点？", a: "主动追踪，并将其转化为获利工具", b: "感到生理性厌恶", weight: 1.0 },
            { id: 39, dim: 'dim5', text: "如果能变成星星，你愿做？", a: "永远守在原位的北极星", b: "在燃烧中坠落的流星", weight: 1.0 },
            { id: 40, dim: 'dim5', text: "如果冒险的代价是可能在史书上查无此人，你是否依然觉得这场远征值得？", a: "否", b: "是", weight: 1.0 },
            { id: 41, dim: 'dim6', text: "面对一张白纸，你感到？", a: "无从下手的焦虑", b: "对表达的饥渴", weight: 1.5 },
            { id: 42, dim: 'dim6', text: "你更喜欢？", a: "优化一个已经存在的系统", b: "创造一个漏洞百出的世界", weight: 1.0 },
            { id: 43, dim: 'dim6', text: "你更在乎？", a: "让事物运转起来", b: "让事物带有你的印记", weight: 1.0 },
            { id: 44, dim: 'dim6', text: "相比于“发明一套新规则”，你是否更擅长在现有的规则里玩到极致？", a: "是", b: "否", weight: 1.0 },
            { id: 45, dim: 'dim6', text: "看到坏掉的木偶，你会？", a: "把它修好如初", b: "把它拆解，改装成一个能飞的鸟", weight: 1.0 },
            { id: 46, dim: 'dim6', text: "你认为“模仿”是？", a: "学习的终点", b: "原创的耻辱", weight: 1.0 },
            { id: 47, dim: 'dim6', text: "你是否享受“万物皆在掌控中”的精确？", a: "是", b: "否", weight: 1.0 },
            { id: 48, dim: 'dim6', text: "面对客户的具体要求，你会追求？", a: "将需求完美落地的职业感", b: "想在成品中夹带私人的审美", weight: 1.0 }
        ];

        let currentStep = 0;
        let scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0, dim5: 0, dim6: 0 };
        let scoreHistory = [];

        function showQuestion() {
            if (currentStep >= questions.length) {
                calculateAndShow();
                return;
            }
            const q = questions[currentStep];
            document.getElementById('progress').innerText = `${currentStep + 1} / 48`;
            document.getElementById('question-area').innerHTML = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <button class="option-btn" onclick="next(0)">A. ${q.a}</button>
                    <button class="option-btn" onclick="next(1)">B. ${q.b}</button>
                </div>`;
        }

       // 兑换码设置（你可以在这里修改）
    const CORRECT_CODE = "cras2026"; // 示例兑换码

    function checkAccess() {
        const input = document.getElementById('access-code').value.trim();
        if (input === CORRECT_CODE || input === "123") { // 暂时多放一个123方便你调试
            startQuiz();
        } else {
            alert("兑换码错误，请重新输入");
        }
    }

        function startQuiz() {
        document.getElementById('cover-container').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        showQuestion();
    }

        function next(choice) {
            const q = questions[currentStep];
            let added = 0;
            if (choice === 1) {
                added = q.weight;
                scores[q.dim] += added;
            }
            scoreHistory.push(added); // 存入历史，以便 back 时扣除
            currentStep++;
            showQuestion();
        }

        function back() {
            if (currentStep > 0) {
                currentStep--;
                const lastAdded = scoreHistory.pop(); // 弹出最后一步的分数
                const q = questions[currentStep];
                scores[q.dim] -= lastAdded; // 扣除分数
                showQuestion();
            }
        }

        function calculateAndShow() {
            const finalCareerObj = getCareer(scores);
            renderResult(scores, finalCareerObj);
        }

        function getCareer(s) {
            const L2 = s.dim2 < 4.25, I2 = s.dim2 >= 4.25;
            const A3 = s.dim3 < 4.25, P3 = s.dim3 >= 4.25;
            const M5 = s.dim5 < 4.25, E5 = s.dim5 >= 4.25;
            const isCreative = s.dim6 >= 4.25, isEfficient = s.dim4 >= 4.25;
            const isAdventurous = s.dim1 >= 4.25, isSlow = s.dim4 < 4.25;
            const isStable = s.dim1 < 4.25, isExecuting = s.dim6 < 4.25;

            if (L2 && A3 && M5) {
                if (isSlow) return careerList[16];
                if (isExecuting) return careerList[19];
                return careerList[4];
            }
            if (L2 && A3 && E5) {
                if (isEfficient) return careerList[1];
                if (isStable) return careerList[6];
                return careerList[3];
            }
            if (L2 && P3 && M5) {
                if (isAdventurous) return careerList[17];
                return careerList[7];
            }
            if (L2 && P3 && E5) return careerList[10];
            if (I2 && P3 && E5) {
                if (isCreative) return careerList[14];
                return careerList[0];
            }
            if (I2 && A3 && M5) {
                if (isAdventurous) return careerList[5];
                if (isCreative) return careerList[18];
                return careerList[8];
            }
            if (I2 && A3 && E5) {
                if (isSlow) return careerList[12];
                if (isCreative) return careerList[9];
                return careerList[11];
            }
            if (I2 && P3 && M5) {
                if (isStable) return careerList[13];
                if (isExecuting) return careerList[2];
                return careerList[15];
            }
            return careerList[0];
        }

        function renderResult(finalScores, careerData) {
    document.getElementById('quiz-container').style.display = 'none';
    
    // 清空现有内容并重新构建 Section 1 (条形图)
    let resultHTML = `
        <div class="section-block">
            <h3 class="audit-section-title">职业倾向维度 / DIMENSIONS</h3>
            <div id="bars-content">`;

    const dims = [
        { id: 'dim1', name: '行动方式', left: '稳定', right: '冒险' },
        { id: 'dim2', name: '思考方式', left: '逻辑', right: '直觉' },
        { id: 'dim3', name: '能量来源', left: '独处', right: '人群' },
        { id: 'dim4', name: '工作节奏', left: '慢工', right: '高效' },
        { id: 'dim5', name: '价值观', left: '市场', right: '自我' },
        { id: 'dim6', name: '创造欲', left: '执行', right: '创作' }
    ];

    dims.forEach(d => {
        const score = finalScores[d.id]; 
// 假设 score 范围是 1-8.5，我们映射到百分比
// 左侧百分比 = ((最大值 - 当前得分) / 差值) * 100
const leftPercent = ((8.5 - score) / (8.5 - 1)) * 100;
const rightPercent = 100 - leftPercent;

resultHTML += `
    <div class="dimension-container">
        <div class="dim-header">${d.name}</div>
        <div class="bar-labels">
            <span>${d.left}</span>
            <span>${d.right}</span>
        </div>
        <div class="dual-bar-wrapper">
            <div style="width: ${leftPercent}%; height: 100%; background-color: var(--stable-bar);"></div>
            <div style="width: ${rightPercent}%; height: 100%; background-color: var(--adventure-bar);"></div>
        </div>
    </div>`;
    });

    resultHTML += `</div></div>`; // DIMENSIONS section end

    // --- 在 renderResult 函数内部替换对应的部分 ---

// 构建 Section 2 (词云：强制居中布局)
resultHTML += `
    <div class="section-block" style="margin-top: 50px;">
        <h3 class="audit-section-title">潜在职业图谱 / CAREER CLOUD</h3>
        <div class="word-cloud-container">
            <div class="core-job">${careerData.name}</div>
`;

// 定义 6 个陪跑词的固定偏移位置 (以中心为原点)
const offsets = [
    { transform: 'translate(-45px, -75px)' }, // 左上
    { transform: 'translate(75px, -50px)' },  // 右上
    { transform: 'translate(-165px, -35px)' },  // 正左
    { transform: 'translate(100px, 35px)' },   // 正右
    { transform: 'translate(-135px, 60px)' },  // 左下
    { transform: 'translate(-5px, 65px)' }    // 右下
];

// 获取 6 个维度的倾向词作为陪跑词
dims.forEach((d, index) => {
    const isRight = finalScores[d.id] >= 4.25;
    const pool = isRight ? sideJobs[d.id].right : sideJobs[d.id].left;
    const randomSideJob = pool[Math.floor(Math.random() * pool.length)];
    const offset = offsets[index];
    
    // 生成样式：利用 translate 确保它们围着中心转
    const posStyle = Object.entries(offset).map(([k, v]) => `${k}:${v}`).join(';');
    resultHTML += `<span class="side-job" style="${posStyle}">${randomSideJob}</span>`;
});

resultHTML += `</div></div>`; // 词云结束

// 构建 Section 3 (入行指南：修改了闭合标签位置)
resultHTML += `
    <div class="section-block">
        <h3 class="audit-section-title">入行指南 / GUIDE</h3>
        <div class="guide-box">
            <h2 id="guide-name" style="text-align: left; margin: 0 0 20px 0; font-size: 1.8rem; border-bottom: 2px solid #000; padding-bottom: 10px;">${careerData.name}</h2>
            <div class="guide-item">
                <h4 style="display: block; text-align: left;">【职业介绍】</h4>
                <p style="text-align: left; text-indent: 0;">${careerData.def}</p>
            </div>
            <div class="guide-item">
                <h4 style="display: block; text-align: left;">【参考书籍】</h4>
                <p style="text-align: left;">${careerData.books}</p>
            </div>
            <div class="guide-item">
                <h4 style="display: block; text-align: left;">【推荐工具】</h4>
                <p style="text-align: left;">${careerData.tools}</p>
            </div>
        </div> <button class="floating-reset-btn" onclick="fullRestart()">
            重启测试
        </button>
        <div class="copyright" style="margin-top:40px; text-align: center;">©2026 @dinosaurbones</div>
    </div>`;

    // 重新注入整个结果 HTML
    const resultContainer = document.getElementById('result-container');
    resultContainer.innerHTML = resultHTML;
    resultContainer.style.display = 'block';

}

        window.onload = function() {
            showQuestion();
        };

        function fullRestart() {
    if (confirm("确定要重新开始测试吗？")) {
        // 1. 重置所有数据
        currentStep = 0;
        scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0, dim5: 0, dim6: 0 };
        scoreHistory = [];
        
        // 2. 隐藏结果页，显示封面页
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('cover-container').style.display = 'block';
        
        // 3. 清空兑换码输入框（可选，看你想不想让他重输）
        document.getElementById('access-code').value = '';
        
        // 4. 回到页面顶部
        window.scrollTo(0, 0);
    }
}
    </script>
</body>
